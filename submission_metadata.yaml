  Used AI assistance for planning, code iteration, review, and local coding-agent execution.
  Final ranking runs locally with no network calls and no hosted model inference.

methodology_summary: |
  Transparent heuristic ranker over candidate profiles and Redrob behavioral signals.
  The model prioritizes production search / retrieval / ranking / recommendation evidence,
  product-company history, Python and evaluation literacy, and hiring-availability signals.
  It penalizes keyword-stuffer patterns, side-project-only GenAI stories, consulting-only
  profiles, inactivity, long notice periods, and inconsistent profile-year claims.

